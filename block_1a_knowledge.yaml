      - thdVoltageRPhase
      - thdCurrentRPhase

  B1PCS1:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1PCS1"
    role: "BESS Power Conversion System (PCS)"
    description: >
      The single PCS interfacing the three BESS containers to the AC bus.
      Handles charge / discharge dispatch via active-power setpoint. Reports
      AC-side and DC-side energy, voltage, current, temperatures, and grid
      waiting time.
    note: >
      Sign convention — dailyAcEnergyImport corresponds to BESS charging
      (drawing AC from the bus); dailyAcEnergyExport corresponds to
      BESS discharging (pushing AC to the bus). Verify against
      activePower polarity in your dataset before relying on it.
    notable_tags:
      "AC active power (kW)": activePower
      "AC apparent power (kVA)": apparentPower
      "AC reactive power (kVAR)": reactivePower
      "DC power (kW)": dcPower
      "DC voltage (V)": dcVoltage
      "DC current (A)": dcCurrent
      "Daily AC charge import (kWh)": dailyAcEnergyImport
      "Daily AC discharge export (kWh)": dailyAcEnergyExport
      "Daily DC charge (kWh)": dailyDcEnergyImport
      "Daily DC discharge (kWh)": dailyDcEnergyExport
      "Lifetime AC export (kWh)": acEnergyTotalExport
      "Lifetime AC import (kWh)": acEnergyTotalImport
      "Lifetime DC export (kWh)": dcEnergyTotalExport
      "Lifetime DC import (kWh)": dcEnergyTotalImport
      "Active power setpoint (kW)": activePowerSetPoint
      "Reactive power setpoint (kVAR)": reactivePowerSetPoint
      "DC compartment temp (°C)": dcTemp
      "AC compartment temp (°C)": acTemp
      "Ambient temp (°C)": ambientTemp
      "Operational status code": inverterStatusOperation
      "Communication health flag": statusCommunicationHealthy
      "Operation time (s)": operationTime
      "Grid waiting time (s)": gridWaitingTime
    all_tags:
