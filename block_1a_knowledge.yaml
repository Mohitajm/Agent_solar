# block_1a_knowledge.yaml
# Knowledge base for the Jamnagar Solar+BESS pilot — Block 1A only.
# The Python agent loads this file at startup and uses it both as
# (a) a system-prompt context and (b) a runtime validator for tool inputs.

plant:
  name: "Jamnagar Solar+BESS Pilot"
  location: "Jamnagar, Gujarat, India"
  operator: "Reliance Industries Limited"
  # Plant discriminator used in the multi-tenant `events` collection.
  # All Mongo queries are filtered with `eid: <this value>` in addition to meterId + time.
  eid: "jamnagarsolar"

block_1a:
  description: >
    Block 1A: Monofacial Fixed-Tilt Solar + BESS, AC-coupled architecture.
    Solar PV is 3.28 MW DC with a single solar inverter (B1INV1).
    BESS is 10.32 MWh total — three containers of 3.44 MWh each (B1BCT1/2/3),
    AC-coupled via a single PCS (B1PCS1). B1PQM2 is the point-of-coupling
    meter measuring combined Solar+BESS output to the grid.
  solar_dc_mw: 3.28
  bess_total_mwh: 10.32
  bess_container_count: 3
  bess_container_mwh: 3.44

# ============================================================
# Shared tag lists (used as YAML anchors below to avoid duplication).
# These are NOT meters themselves — the Python loader filters them out.
# ============================================================
_shared:

  bct_notable_tags: &BCT_NOTABLE
