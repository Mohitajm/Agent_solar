    "Min cell voltage in pack (V)": minCellVoltagePack
    "Avg cell temperature (°C)": bessAvgTemperature
    "Max cell temperature (°C)": bessMaxTemperature
    "Min cell temperature (°C)": bessMinTemperature
    "Lifetime charge energy (kWh)": bessAccChargeEnergy
    "Lifetime discharge energy (kWh)": bessAccDischargeEnergy
