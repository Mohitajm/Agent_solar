      - tms
      - statusCommunicationHealthy
      - inverterStatusOperation
      - dcEnergyTotalExport
      - dcEnergyTotalImport
      - acEnergyTotalExport
      - acEnergyTotalImport
      - dailyAcEnergyExport
      - dailyAcEnergyImport
      - dailyDcEnergyExport
      - dailyDcEnergyImport
      - powerFactor
      - frequency
      - activePower
