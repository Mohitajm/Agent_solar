      - phaseRCurrent
      - phaseBVoltage
      - phaseBCurrent
      - phaseYVoltage
      - phaseYCurrent
      - ambientTemp
      - inverterType
      - gfdiSwitchStatus
      - operationTime
      - gridWaitingTime
      - activePowerSetPoint
      - reactivePowerSetPoint
      - actualMeterEvent
      - fdp_details
      - service_workorder_details
      - equipment_details

  B1BCT1:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1BCT1"
    role: "BESS Container 1 (3.44 MWh)"
    description: >
      BESS container 1 of 3. Reports rack-level SOC/SOH, cell-level
      voltage extremes, pack temperatures, available charge/discharge
      energy headroom, AC active power at the container terminals,
      and container UPS metrics.
    notable_tags: *BCT_NOTABLE
    all_tags: *BCT_ALL_TAGS

  B1BCT2:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1BCT2"
    role: "BESS Container 2 (3.44 MWh)"
    description: >
      BESS container 2 of 3. Identical schema and capacity to B1BCT1.
    notable_tags: *BCT_NOTABLE
    all_tags: *BCT_ALL_TAGS

  B1BCT3:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1BCT3"
    role: "BESS Container 3 (3.44 MWh)"
    description: >
      BESS container 3 of 3. Identical schema and capacity to B1BCT1.
    notable_tags: *BCT_NOTABLE
    all_tags: *BCT_ALL_TAGS

  WMS:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_PPCWMS1"
    role: "Weather Monitoring Station (shared)"
    description: >
      Plant-level weather monitoring station. Physically shared across
      Blocks 1A / 1B / 1C, but in this agent it is used only for Block 1A
      analysis. Provides GHI, plane-of-array irradiance, ambient and
      module temperatures, wind, humidity, and rainfall.
    notable_tags:
      "Global Horizontal Irradiance, GHI (W/m²)": globalHorizontalIrradiance
      "Plane of Array irradiance, sensor 01 (W/m²)": planeOfArraySensor01
      "Daily GHI integral (kWh/m²)": globalCalculatedkWhPerDay
      "Daily POA integral, sensor 01 (kWh/m²)": poaCalculatedkWhPerDaySensor01
      "Ambient temperature (°C)": ambientTemperature
      "Module temperature, sensor 01 (°C)": moduleTemperatureSensor01
      "Module temperature, sensor 03 (°C)": moduleTemperatureSensor03
      "Wind speed (m/s)": windSpeed
      "Wind direction (deg)": windDirection
      "Humidity (%)": humidity
      "Rainfall (mm)": rainfall
    all_tags:
      - slaveId
      - ver
      - tms
