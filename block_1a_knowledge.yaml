    "Available discharge headroom (kWh)": bessAvailableDischargeEnergy
    "Max charging current (A)": bessMaxChargingCurrent
    "Max discharging current (A)": bessMaxDischargingCurrent
    "Max charging power (kW)": bessMaxChargingPower
    "Max discharging power (kW)": bessMaxDischargingPower
    "AC active power at container (kW)": activePower
    "AC reactive power (kVAR)": reactivePower
    "Container status code": bessStatus
    "Container humidity (%)": humidity

