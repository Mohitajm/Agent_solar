# ============================================================
# Meter inventory (Block 1A)
# Tag names are stored WITHOUT the "meter." prefix.
# The Python loader adds "meter." when querying MongoDB.
# ============================================================
meters:

  B1INV1:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1INV1"
    role: "Solar Inverter"
    description: >
      The single solar PV inverter for Block 1A. Converts the 3.28 MW DC
      monofacial fixed-tilt array output into AC. Reports 24 string-combiner-box
      currents (SCB1current…SCB24current) for string-level diagnostics.
    note: >
      24 string-CB current channels (SCB1current to SCB24current) are
      available — use these for spotting under-performing PV strings.
    notable_tags:
      "AC output power (kW)": outputPower
      "DC input PV power (kW)": inputPVPower
      "Daily energy (kWh)": energyToday
      "Lifetime energy (kWh)": energyTillDate
      "Apparent energy today (kVAh)": apparentEnergyToday
      "Lifetime apparent energy (kVAh)": apparentEnergyTillDate
      "DC input voltage (V)": inputVoltage
      "DC input current (A)": inputCurrent
      "AC R-phase voltage (V)": vacRphase
      "AC Y-phase voltage (V)": vacYphase
      "AC B-phase voltage (V)": vacBphase
      "Reactive power (kVAR)": reactivePower
      "Frequency (Hz)": frequency
      "Power factor": pF
      "Inverter status code": inverterStatus
    all_tags:
      - slaveId
      - tms
      - apparentEnergyTillDate
      - apparentEnergyToday
      - inputPVPower
      - inputCurrent
      - inputVoltage
      - reactivePower
      - inverterStatus
      - pF
      - outputPower
      - frequency
      - vacRphase
      - vacYphase
      - vacBphase
      - energyToday
      - energyTillDate
      - SCB1current
      - SCB2current
      - SCB3current
      - SCB4current
      - SCB5current
      - SCB6current
      - SCB7current
      - SCB8current
      - SCB9current
      - SCB10current
      - SCB11current
      - SCB12current
      - SCB13current
      - SCB14current
      - SCB15current
      - SCB16current
      - SCB17current
      - SCB18current
      - SCB19current
      - SCB20current
      - SCB21current
      - SCB22current
      - SCB23current
      - SCB24current
      - actualMeterEvent
      - fdp_details
      - service_workorder_details
      - equipment_details

  B1MFM2:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1MFM2"
    role: "Solar Output MFM"
    description: >
      Multi-function meter installed at the AC output of the solar inverter
      (post-inverter, pre-coupling). This is the cleanest measurement of
      pure solar generation for Block 1A.
    notable_tags: *MFM_NOTABLE
    all_tags: *MFM_ALL_TAGS

  B1MFM1:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1MFM1"
    role: "Auxiliary Consumption MFM"
    description: >
      Multi-function meter measuring auxiliary / parasitic power consumption
      of Block 1A equipment (PCS aux loads, BESS HVAC, lighting, control panels,
      etc.). Use dailyActiveEnergyImport for daily aux kWh.
    notable_tags: *MFM_NOTABLE
    all_tags: *MFM_ALL_TAGS

  B1PQM2:
    full_id: "JAMNAGAR_VIRTUAL_GATEWAY_B1PQM2"
    role: "Point of Coupling Meter (with Power Quality)"
    description: >
      MFM at the point of coupling — the combined Solar+BESS net output
      to the grid. This is the meter that matters for energy accounting,
      DSM, and PPA compliance. Also reports THD on V and I per phase.
    notable_tags:
      "Active power to grid (kW)": activePower
      "Reactive power (kVAR)": reactivePower
      "Power factor": powerFactor
      "Frequency (Hz)": frequency
      "Daily export to grid (kWh)": dailyActiveEnergyExport
      "Daily import from grid (kWh)": dailyActiveEnergyImport
      "Lifetime export (kWh)": totalActiveEnergyExport
      "Lifetime import (kWh)": totalActiveEnergyImport
      "Net active energy (kWh)": netActiveEnergy
      "Daily peak active power (kW)": dailyPeackActivePower
      "Max demand active power (kW)": maxDemandActivePower
      "Max demand reactive power (kVAR)": maxDemandReactivePower
      "Max demand apparent power (kVA)": maxDemandApparentPower
      "THD voltage R-phase (%)": thdVoltageRPhase
      "THD current R-phase (%)": thdCurrentRPhase
    all_tags:
      - slaveId
      - ver
      - tms
      - voltageRPhase
      - voltageYPhase
      - voltageBPhase
      - currentRPhase
      - currentYPhase
      - currentBPhase
